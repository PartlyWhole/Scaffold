<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storing a value — Scaffold</title>
  <link rel="stylesheet" href="storing-a-value.css">
</head>
<body>
  <header>
    <a class="back-link" href="../index.html">&larr; Editor</a>
    <h1>Storing a value</h1>
  </header>
  <main>
    <div id="stage" data-beat="0" aria-live="polite">
      <div class="value">10</div>
      <div class="container">
        <div class="label">health</div>
        <div class="box"></div>
      </div>
      <pre class="code"><code>health = 10</code></pre>
    </div>
    <p id="caption"></p>
    <div class="controls">
      <button id="back" type="button">&larr; Back</button>
      <button id="next" type="button">Next &rarr;</button>
      <button id="restart" type="button">Restart</button>
    </div>
  </main>
  <script src="storing-a-value.js"></script>
</body>
</html>
